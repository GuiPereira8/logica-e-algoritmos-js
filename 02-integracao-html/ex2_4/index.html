<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante JS</title>
  </head>
  <body>
    <h1>Restaurante JS</h1>
    <form action="#">
      <p>
        <label for="inQuilo">Buffet por Quilo R$: </label>
        <input
          type="number"
          name="inQuilo"
          id="inQuilo"
          min="0"
          step="0.01"
          required
        />
      </p>
      <p>
        <label for="inConsumo">Consumo por Cliente (gr): </label>
        <input type="number" name="inConsumo" id="inConsumo" min="0" required />
      </p>
      <input type="submit" value="Calcular Preço" />
    </form>

    <h3 id="outSaida"></h3>
    <script src="script.js"></script>
  </body>
</html>
