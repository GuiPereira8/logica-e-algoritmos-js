<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipos de Variáveis</title>
  </head>
  <body>
    <script>
      const fruta = "banana";
      const preco = 3.5;
      const levar = true;
      let novoValor;
      //Comando typeof mostra no console qual tipo que a variável especificada tem.
      console.log(typeof fruta);
      console.log(typeof preco);
      console.log(typeof levar);
      console.log(typeof novoValor);
      //Para descobrir se o número é inteiro ou possui casas decimais podemos usar
      //O seguinte comando: Number.isInteger().
      console.log(Number.isInteger(12)); //True
      console.log(Number.isInteger(3.5)); //False
    </script>
  </body>
</html>
