<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soma de dois números</title>
  </head>
  <body>
    <!-- Elaborar um programa simples é necessário realizar três etapas:
          Entrada, Processamento e Saída -->
    <script>
      const num1 = Number(prompt("1° Número: ")); // lê os números: entrada
      const num2 = Number(prompt("2° Número: "));
      const soma = num1 + num2; // Calcula a soma: Processamento
      window.alert(`A soma dos números é: ${soma}`); //Exibe o resultado: Saída
    </script>
  </body>
</html>
