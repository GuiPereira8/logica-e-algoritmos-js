<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operações strings e números</title>
  </head>
  <body>
    <script>
      const a = "20";
      const b = a * 2; // b = 40
      const c = a / 2; // c = 10
      const d = a - 2; // d = 18
      const e = a + 2; // e = 202 ??
      // O retorno da variável e é diferente do padrão, pois a linguagem concatena (+) o texto com número.
      // Se for Número + Número é feito a soma.
      // Se for String + String  ou String + Número é feito a concatenação.
      // Para resolver devemos converter a string para um número, usando métodos
      // Number(), parseInt(), parseFloat().
      const f = Number(a) + 2; // f = 22
      alert(`F: ${f}`);
    </script>
  </body>
</html>
