<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duração de horas de uma viajem</title>
  </head>
  <body>
    <script>
      const dias = Number(prompt("N° Dias: "));
      const horas = Number(prompt("N° Horas: "));
      const total = dias * 24 + horas;
      window.alert(`Total de Horas: ${total}`);
    </script>
  </body>
</html>
