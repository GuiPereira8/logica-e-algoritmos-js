<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cálculo do dobro de um número</title>
  </head>
  <body>
    <script>
      const num = prompt("Numero: ");
      const dobro = num * 2;
      window.alert(`O dobro é: ${dobro}`);
    </script>
  </body>
</html>
