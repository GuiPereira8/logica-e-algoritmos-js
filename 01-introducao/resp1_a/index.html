<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descobrindo os números vizinhos</title>
  </head>
  <body>
    <script>
      const numero = Number(prompt("Digite um número: "));
      const numeroAnterior = numero - 1;
      const numeroPosterior = numero + 1;
      window.alert(
        `Número: ${numero}\nVizinhos: ${numeroAnterior} e ${numeroPosterior}`,
      );
    </script>
  </body>
</html>
